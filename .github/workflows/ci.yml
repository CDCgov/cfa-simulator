name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: plz format
      - run: plz typecheck

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - uses: ./.github/actions/setup-rust
      - run: plz cli format
      - run: plz cli lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: plz test

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - uses: ./.github/actions/setup-rust
      - run: plz cli test

  test-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps
      - run: plz docs test

  test-cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: ./.github/actions/setup-rust
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - run: cargo build -p cfasim
      - run: plz cli e2e

  test-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: k88hudson/setup-plz@v1
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-rust
      - run: pnpm install
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps
      - run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
        id: date
      - uses: actions/cache@v5
        with:
          path: .cache/nssp_ed_raw.csv
          key: nssp-ed-data-${{ steps.date.outputs.date }}
      - run: uv run scripts/fetch_nssp_ed.py
      - run: plz models test
