name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-plz
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - uses: ./.github/actions/setup-rust
      - run: pnpm install
      - run: plz docs build
      - run: plz examples build-python
        env:
          BASE_URL: /cfa-simulator/python-example/
      - run: plz examples build-rust-app
        env:
          BASE_URL: /cfa-simulator/rust-example/
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/.vitepress/dist/* _site/
          cp -r examples/python-example/dist _site/python-example
          cp -r examples/rust-example/dist _site/rust-example
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
