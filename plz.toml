# Install all dependencies
[tasks.setup]
run = "pnpm install && pnpm exec playwright install chromium && cargo install wasm-pack && uv sync"

# Run all tests
[tasks.test]
run = "pnpm exec vitest run"
git_hook = "pre-commit"

# Check formatting
[tasks.format]
run = "pnpm exec prettier --check ."
git_hook = "pre-commit"
fail_hook = { suggest_command = "plz fix" }

# Type-check
[tasks.typecheck]
run = "pnpm exec vue-tsc --noEmit -p cfasim-ui/charts/tsconfig.json && pnpm exec vue-tsc --noEmit -p cfasim-ui/components/tsconfig.json"
git_hook = "pre-commit"

# Auto-fix formatting
[tasks.fix]
run = "pnpm exec prettier --write ."

# Initialize a new cfasim project
[tasks.init]
run = "cargo run -p cfasim -- init"

# Bump all package versions (patch, minor, or major)
[tasks.version]
run = "node scripts/version.mjs ${1}"

[taskgroup.publish.pnpm]
run = "pnpm -r publish --access public"

[taskgroup.publish.cargo]
run = "cargo publish -p cfasim-model && cargo publish -p cfasim"

[taskgroup.cli.extends]
dir = "cfasim"

# Format Rust code
[taskgroup.cli.format]
run = "cargo fmt --check"
git_hook = "pre-commit"
fail_hook = { suggest_command = "plz cli fix" }

# Auto-fix Rust formatting
[taskgroup.cli.fix]
run = "cargo fmt"

# Run Rust tests
[taskgroup.cli.test]
run = "cargo test"

# Lint Rust code
[taskgroup.cli.lint]
run = "cargo clippy -- -D warnings"

# Integration tests for the CLI (scaffolds projects + Playwright)
[taskgroup.cli.e2e]
run = "pnpm exec playwright test --config playwright.config.ts"

[taskgroup.examples.extends]
dir = "examples"

# Run the Rust example dev server
[taskgroup.examples.dev-rust]
dir = "examples/rust-example"
run = "pnpm dev"

# Run the Python example dev server
[taskgroup.examples.dev-python]
dir = "examples/python-example"
run = "pnpm dev"

# Build the Python example
[taskgroup.examples.build-python]
dir = "examples/python-example"
run = "pnpm exec vite build"

# Build the Rust example app
[taskgroup.examples.build-rust-app]
dir = "examples/rust-example"
run = "pnpm exec vite build"

# E2E test for Python example
[taskgroup.examples.test-python]
dir = "examples/python-example"
run = "pnpm exec playwright test --config playwright.config.ts"
git_hook = "pre-push"

# Run the Fetch example dev server
[taskgroup.examples.dev-fetch]
dir = "examples/fetch-example"
run = "pnpm dev"

# Build the Fetch example
[taskgroup.examples.build-fetch]
dir = "examples/fetch-example"
run = "pnpm exec vite build"

# E2E test for Rust example
[taskgroup.examples.test-rust]
dir = "examples/rust-example"
run = "pnpm exec playwright test --config playwright.config.ts"
git_hook = "pre-push"

# E2E test for Fetch example
[taskgroup.examples.test-fetch]
dir = "examples/fetch-example"
run = "pnpm exec playwright test --config playwright.config.ts"
git_hook = "pre-push"

[taskgroup.docs.extends]
dir = "docs"

# Generate the component and API documentation for the docs site
[taskgroup.docs.generate]
dir = "."
run = "node scripts/generate_docs.mjs"

# Serve docs locally
[taskgroup.docs.dev]
depends = "docs.generate"
run = "pnpm exec vitepress dev"

# Build static files for docs
[taskgroup.docs.build]
depends = "docs.generate"
run = "pnpm exec vitepress build"

# Run tests for docs (Playwright tests for docs site)
[taskgroup.docs.test]
depends = "docs.generate"
run = "pnpm exec playwright test --config playwright.config.ts"
git_hook = "pre-push"
